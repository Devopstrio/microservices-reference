version: '3.8'

services:
  gateway:
    build: ./apps/gateway-service
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - user-service
      - order-service

  user-service:
    build: ./apps/user-service
    env_file: .env
    depends_on:
      - user-db

  order-service:
    build: ./apps/order-service
    env_file: .env
    depends_on:
      - order-db
      - kafka

  payment-service:
    build: ./apps/payment-service
    env_file: .env
    depends_on:
      - payment-db
      - kafka

  inventory-service:
    build: ./apps/inventory-service
    env_file: .env
    depends_on:
      - inventory-db
      - kafka

  notification-service:
    build: ./apps/notification-service
    env_file: .env
    depends_on:
      - kafka

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - gateway

  kafka:
    image: bitnami/kafka:3.4.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - ALLOW_PLAINTEXT_LISTENER=yes

  user-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: user_pass
      POSTGRES_DB: user_db

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: order_admin
      POSTGRES_PASSWORD: order_pass
      POSTGRES_DB: order_db

  payment-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: payment_admin
      POSTGRES_PASSWORD: payment_pass
      POSTGRES_DB: payment_db

  inventory-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: inventory_admin
      POSTGRES_PASSWORD: inventory_pass
      POSTGRES_DB: inventory_db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
